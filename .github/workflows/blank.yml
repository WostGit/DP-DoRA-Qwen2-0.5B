name: "DP-SGD Multi-Step Training Loop Test"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-full-loop:
    name: "Validate Reusable DP Training Function"
    runs-on: macos-latest

    steps:
      - name: "Step 0: Checkout Code"
        uses: actions/checkout@v4

      - name: "Step 1: Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Step 2: Install NumPy"
        run: pip install numpy

      - name: "Step 3: Run Full Loop Diagnostics"
        run: |
          python -c "
          import numpy as np

          np.random.seed(42)

          # ================================================================
          # 📦 THE REUSABLE DP-SGD OPTIMIZER FUNCTION
          # ================================================================
          def apply_dp_gradients(weights, X_batch, y_batch, clip_norm, sigma, lr):
              \"\"\"
              Computes gradients, applies per-sample clipping, injects Gaussian noise,
              and updates the weights.
              \"\"\"
              batch_size = X_batch.shape[0]
              per_sample_grads = []
              
              # 1. Compute per-sample gradients
              for i in range(batch_size):
                  x_i = X_batch[i:i+1]
                  y_i = y_batch[i:i+1]
                  y_pred = np.dot(x_i, weights)
                  # Gradient of MSE: 2 * x^T * (y_pred - y)
                  grad = 2 * x_i.T * (y_pred - y_i)
                  per_sample_grads.append(grad)
                  
              # 2. Per-sample clipping
              clipped_grads = []
              for grad in per_sample_grads:
                  norm = np.linalg.norm(grad)
                  factor = min(1.0, clip_norm / (norm + 1e-8)) # Added epsilon to prevent div by zero
                  clipped_grads.append(grad * factor)
                  
              # 3. Average and add noise
              avg_grad = np.mean(clipped_grads, axis=0)
              noise_scale = (sigma * clip_norm) / batch_size
              noise = np.random.normal(0, noise_scale, avg_grad.shape)
              
              noisy_grad = avg_grad + noise
              
              # 4. Weight update
              updated_weights = weights - (lr * noisy_grad)
              
              return updated_weights, norm

          # ================================================================
          # 🚀 SIMULATING A FULL TRAINING RUN
          # ================================================================
          
          # Hyperparameters
          CLIP_NORM = 1.0
          SIGMA = 1.9058 
          LEARNING_RATE = 0.05
          BATCH_SIZE = 4
          EPOCHS = 3

          # Initialize dummy model weights
          model_weights = np.zeros((2, 1))

          print('================================================================')
          print('🔬 STARTING MULTI-STEP DP-SGD TRAINING SIMULATION')
          print('================================================================')
          print(f'Hyperparameters: Sigma={SIGMA}, Clip={CLIP_NORM}, LR={LEARNING_RATE}\n')

          for epoch in range(EPOCHS):
              print(f'--- 🏁 EPOCH {epoch + 1} ---')
              
              # Generate random data for this specific batch
              X_batch = np.random.uniform(-5.0, 5.0, (BATCH_SIZE, 2))
              y_batch = np.random.uniform(-1.0, 1.0, (BATCH_SIZE, 1))
              
              # Run our custom step
              model_weights, last_norm = apply_dp_gradients(
                  model_weights, X_batch, y_batch, CLIP_NORM, SIGMA, LEARNING_RATE
              )
              
              print(f'  [LOG] Weights after update:\n{model_weights.flatten()}')
              print(f'  [LOG] Final sample norm was bounded to max: {CLIP_NORM}\n')

          print('================================================================')
          print('🏆 TRAINING COMPLETE')
          print('================================================================')
          print(f'Final Trained Weights:\n{model_weights}')
          "
