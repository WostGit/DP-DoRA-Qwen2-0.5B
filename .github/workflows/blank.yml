name: "DP-SGD Noise Level Comparison on Sensitive Data"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compare-noise-levels:
    name: "Compare Rényi vs Proactive Noise"
    runs-on: macos-latest

    steps:
      - name: "Step 0: Checkout Code"
        uses: actions/checkout@v4

      - name: "Step 1: Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Step 2: Install NumPy"
        run: pip install numpy

      - name: "Step 3: Run Comparison"
        run: |
          python -c "
          import numpy as np

          np.random.seed(42)

          # ================================================================
          # 🏥 SIMULATED SENSITIVE DATASET
          # ================================================================
          # Imagine 4 patients with specific medical biomarker readings
          # Feature 1: Blood pressure deviation, Feature 2: Cholesterol level
          # Target: Likelihood of a specific diagnosis (0.0 to 1.0)
          
          X_sensitive = np.array([
              [1.2, 3.4],   # Patient A
              [-0.5, 0.2],  # Patient B
              [4.5, -2.1],  # Patient C (Severe outlier)
              [-2.2, -1.1]  # Patient D
          ])
          
          y_sensitive = np.array([[0.8], [0.1], [0.95], [0.05]])

          # ================================================================
          # 📦 THE DP-SGD FUNCTION
          # ================================================================
          def apply_dp_gradients(weights, X, y, clip_norm, sigma, lr):
              batch_size = X.shape[0]
              per_sample_grads = []
              
              for i in range(batch_size):
                  x_i = X[i:i+1]
                  y_i = y[i:i+1]
                  y_pred = np.dot(x_i, weights)
                  grad = 2 * x_i.T * (y_pred - y_i)
                  per_sample_grads.append(grad)
                  
              clipped_grads = []
              for grad in per_sample_grads:
                  norm = np.linalg.norm(grad)
                  factor = min(1.0, clip_norm / (norm + 1e-8))
                  clipped_grads.append(grad * factor)
                  
              avg_grad = np.mean(clipped_grads, axis=0)
              
              # Generate noise
              noise_scale = (sigma * clip_norm) / batch_size
              noise = np.random.normal(0, noise_scale, avg_grad.shape)
              
              noisy_grad = avg_grad + noise
              updated_weights = weights - (lr * noisy_grad)
              
              return updated_weights, avg_grad, noise

          # ================================================================
          # 🧪 RUNNING THE COMPARISON
          # ================================================================
          CLIP_NORM = 1.0
          LEARNING_RATE = 0.05
          
          # The two calculated noise scales from our previous tests
          RENYI_SIGMA = 1.8847
          PROACTIVE_SIGMA = 35.7661

          print('================================================================')
          print('🔬 RUNNING TEST A: RÉNYI DP (OPACUS STYLE) - SIGMA = 1.8847')
          print('================================================================')
          
          weights_renyi = np.zeros((2, 1))
          
          for epoch in range(3):
              weights_renyi, clean_g, noise = apply_dp_gradients(
                  weights_renyi, X_sensitive, y_sensitive, CLIP_NORM, RENYI_SIGMA, LEARNING_RATE
              )
              print(f'Epoch {epoch+1} Weights: {weights_renyi.flatten()}')

          print('\n================================================================')
          print('🔬 RUNNING TEST B: PROACTIVE PURE DP - SIGMA = 35.7661')
          print('================================================================')
          
          weights_proactive = np.zeros((2, 1))
          
          for epoch in range(3):
              weights_proactive, clean_g, noise = apply_dp_gradients(
                  weights_proactive, X_sensitive, y_sensitive, CLIP_NORM, PROACTIVE_SIGMA, LEARNING_RATE
              )
              print(f'Epoch {epoch+1} Weights: {weights_proactive.flatten()}')

          print('\n================================================================')
          print('🏆 FINAL COMPARISON')
          print('================================================================')
          print(f'Rényi Final Weights:     {weights_renyi.flatten()}')
          print(f'Proactive Final Weights: {weights_proactive.flatten()}')
          "
