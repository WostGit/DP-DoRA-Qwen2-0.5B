name: "Ultra-Verbose Proactive DP Math Engine Stress-Test"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-calculator-suite:
    name: "Execute Stress-Tests on DP Accountant"
    runs-on: macos-latest

    steps:
      - name: "Step 0: Checkout Code"
        uses: actions/checkout@v4

      - name: "Step 1: Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Step 2: Run Verbose Math Diagnostics"
        run: |
          python -c "
          import math
          import sys

          def calculate_sigma(epsilon, delta, steps):
              \"\"\"Extrapolated Proactive DP closed-form equation.\"\"\"
              # Guard rails against impossible math
              if epsilon <= 0 or delta <= 0 or steps <= 0:
                  return float('nan')
              return math.sqrt(2 * steps * math.log(1 / delta)) / epsilon

          print('================================================================')
          print('🔬 TEST 1: THE INVERSE SCALING LAW (Epsilon Sensitivity)')
          print('================================================================')
          print('Theory: As target Epsilon decreases (stricter privacy),')
          print('the required noise scale (Sigma) must increase exponentially.')
          print('Constants: Delta = 1e-5, Steps = 500\n')

          delta = 1e-5
          steps = 500
          epsilons = [10.0, 5.0, 3.0, 1.0, 0.5, 0.1]

          for eps in epsilons:
              sigma = calculate_sigma(eps, delta, steps)
              print(f'[INPUT]  Epsilon: {eps:<5} | Delta: {delta} | Steps: {steps}')
              print(f'[OUTPUT] Required Noise Scale (Sigma): {sigma:.4f}')
              print(f'[LOG]    Noise density multiplier relative to step: {sigma/steps:.6f}\n')

          print('\n================================================================')
          print('🔬 TEST 2: THE SQUARE-ROOT TIME COMPLEXITY (Step Scaling)')
          print('================================================================')
          print('Theory: As training steps grow, privacy leakage compounds.')
          print('To compensate, Sigma must increase by a factor of sqrt(Steps).')
          print('Constants: Epsilon = 3.0, Delta = 1e-5\n')

          eps = 3.0
          delta = 1e-5
          step_list = [1, 10, 100, 500, 1000, 5000]

          for s in step_list:
              sigma = calculate_sigma(eps, delta, s)
              print(f'[INPUT]  Epsilon: {eps} | Delta: {delta} | Steps: {s:<5}')
              print(f'[OUTPUT] Required Noise Scale (Sigma): {sigma:.4f}')
              ratio = sigma / math.sqrt(s)
              print(f'[LOG]    Consistency Check (Sigma / sqrt(Steps)): {ratio:.4f} (Should be constant!)\n')

          print('\n================================================================')
          print('🔬 TEST 3: THE IMPOSSIBLE EDGE CASES (System Crash Resistance)')
          print('================================================================')
          print('Theory: Passing zero or negative privacy parameters should fail')
          print('gracefully rather than generating mathematically impossible noise.\n')

          edge_cases = [
              {'eps': 0.0, 'delta': 1e-5, 'steps': 500, 'label': 'Zero Epsilon (Infinite Privacy)'},
              {'eps': 3.0, 'delta': 0.0, 'steps': 500, 'label': 'Zero Delta (Perfect Guarantee)'},
              {'eps': 3.0, 'delta': 1e-5, 'steps': -100, 'label': 'Negative Steps'},
          ]

          for case in edge_cases:
              print(f\"Evaluating Edge Case: {case['label']}\")
              print(f\"[INPUT]  Epsilon: {case['eps']} | Delta: {case['delta']} | Steps: {case['steps']}\")
              try:
                  # If using math.log(0), Python will naturally throw a ValueError.
                  # Let's see if our wrapper handles it or yields NaN.
                  sigma = calculate_sigma(case['eps'], case['delta'], case['steps'])
                  print(f'[OUTPUT] Noise Scale Result: {sigma}')
              except ValueError as e:
                  print(f'[OUTPUT] Successfully caught math domain error: {e}')
              print('-----------------------------------------')
          "
