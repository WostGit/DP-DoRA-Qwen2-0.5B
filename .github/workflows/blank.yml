name: "Dual DP Accountant Stress-Test"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-calculators:
    name: "Execute Proactive vs Rényi DP Accountants"
    runs-on: macos-latest

    steps:
      - name: "Step 0: Checkout Code"
        uses: actions/checkout@v4

      - name: "Step 1: Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Step 2: Run Dual Verbose Math Diagnostics"
        run: |
          python -c "
          import math
          import sys

          # ================================================================
          # CALCULATOR DEFINITIONS
          # ================================================================

          def proactive_calculator(epsilon, delta, steps):
              \"\"\"
              Method A: Closed-form analytical bound.
              Fast, static, and safe, but highly conservative.
              \"\"\"
              if epsilon <= 0 or delta <= 0 or steps <= 0:
                  return float('nan')
              return math.sqrt(2 * steps * math.log(1 / delta)) / epsilon


          def renyi_calculator(epsilon, delta, steps, q=0.01):
              \"\"\"
              Method B: A simulated Rényi DP (RDP) Accountant.
              Accounts for subsampling rate (q). Deep learning models take advantage 
              of the fact that we only see a small sample of the dataset at a time.
              \"\"\"
              if epsilon <= 0 or delta <= 0 or steps <= 0:
                  return float('nan')
              
              # Optimal order alpha usually hovers around 2 to 20 for LLMs. 
              # We will optimize for alpha = 10 for this simulation.
              alpha = 10.0
              
              # Subsampling amplification: Noise is scaled down because we don't look at all data at once
              effective_steps = steps * (q ** 2)
              
              # Rényi privacy loss calculation
              rdp_epsilon = effective_steps * alpha / 2.0
              
              # Converting RDP back to standard (epsilon, delta) DP
              # Formula: epsilon = rdp_epsilon + log(1/delta) / (alpha - 1)
              required_sigma = math.sqrt((alpha * effective_steps) / (2 * (epsilon - (math.log(1 / delta) / (alpha - 1)))))
              
              # If the subtraction yields a negative domain, RDP cannot find a valid small sigma.
              if required_sigma <= 0 or math.isnan(required_sigma):
                  return proactive_calculator(epsilon, delta, steps) * 0.5 # Fallback to a tighter estimate
                  
              return required_sigma

          # ================================================================
          # SYSTEM EXECUTION & VERBOSE LOGS
          # ================================================================

          # Test Parameters
          delta = 1e-5
          steps = 500
          epsilons = [10.0, 3.0, 1.0, 0.5]
          q = 0.05 # 5% data subsampling rate (standard batching)

          print('================================================================')
          print('🔬 TEST 1: NOISE COMPARISON ACROSS EPSILON BOUNDS')
          print('================================================================')
          print(f'Constants: Delta = {delta}, Total Steps = {steps}, Sample Rate (q) = {q}\n')

          for eps in epsilons:
              sigma_a = proactive_calculator(eps, delta, steps)
              sigma_b = renyi_calculator(eps, delta, steps, q)
              
              print(f'[INPUT]  Target Epsilon: {eps}')
              print(f'[PROACTIVE A] Noise Scale (Sigma): {sigma_a:.4f}')
              print(f'[RENYI B]     Noise Scale (Sigma): {sigma_b:.4f}')
              
              reduction = ((sigma_a - sigma_b) / sigma_a) * 100
              print(f'[LOG]    Rényi reduced required noise by: {reduction:.2f}%\n')

          print('\n================================================================')
          print('🔬 TEST 2: THE DATA SCALE EFFECT (Varying Sample Rate q)')
          print('================================================================')
          print('Theory: In a true RDP accountant, smaller batch sampling rates (q)')
          print('should heavily reward the model with much lower required noise.\n')

          eps = 3.0
          sample_rates = [0.01, 0.05, 0.1, 0.5]

          for rate in sample_rates:
              sigma_a = proactive_calculator(eps, delta, steps)
              sigma_b = renyi_calculator(eps, delta, steps, rate)
              
              print(f'[INPUT]  Sample Rate (q): {rate}')
              print(f'[PROACTIVE A] Noise Scale (Sigma): {sigma_a:.4f} (Static)')
              print(f'[RENYI B]     Noise Scale (Sigma): {sigma_b:.4f}')
              print(f'[LOG]    RDP adaptation ratio: {sigma_b / sigma_a:.4f}\n')
          "
