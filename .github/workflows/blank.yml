name: "True End-to-End DP Auto-Calibrating Pipeline"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-e2e-pipeline:
    name: "Auto-Calibrate and Train"
    runs-on: macos-latest

    steps:
      - name: "Step 0: Checkout Code"
        uses: actions/checkout@v4

      - name: "Step 1: Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Step 2: Install Libraries"
        run: |
          pip install --upgrade pip
          pip install numpy opacus

      - name: "Step 3: Run Auto-Calibrated Pipeline"
        run: |
          python -c "
          import numpy as np
          import math
          from opacus.accountants.utils import compute_noise_multiplier

          np.random.seed(42)

          print('================================================================')
          print('⚖️ PART 1: TRUE DP AUTO-CALIBRATION')
          print('================================================================')
          
          # Real-world training parameters
          TARGET_EPSILON = 3.0
          TARGET_DELTA = 1e-5
          STEPS = 500
          SAMPLE_RATE = 0.05
          
          # Opacus natively solves for the perfect sigma to reach our exact epsilon
          SIGMA = compute_noise_multiplier(
              target_epsilon=TARGET_EPSILON,
              target_delta=TARGET_DELTA,
              sample_rate=SAMPLE_RATE,
              epochs=1, # Setting to 1 because we are giving total explicit steps
              steps=STEPS
          )
          
          print(f'[INPUT] Target Epsilon: {TARGET_EPSILON}')
          print(f'[INPUT] Target Delta: {TARGET_DELTA}')
          print(f'[INPUT] Total Steps: {STEPS}')
          print(f'[OPACUS] Solved exact required Noise Scale (Sigma): {SIGMA:.6f}\n')

          # ================================================================
          # 📦 THE REUSABLE DP-SGD OPTIMIZER FUNCTION
          # ================================================================
          def apply_dp_gradients(weights, X_batch, y_batch, clip_norm, sigma, lr):
              batch_size = X_batch.shape[0]
              per_sample_grads = []
              
              # 1. Compute per-sample gradients
              for i in range(batch_size):
                  x_i = X_batch[i:i+1]
                  y_i = y_batch[i:i+1]
                  y_pred = np.dot(x_i, weights)
                  grad = 2 * x_i.T * (y_pred - y_i)
                  per_sample_grads.append(grad)
                  
              # 2. Per-sample clipping
              clipped_grads = []
              for grad in per_sample_grads:
                  norm = np.linalg.norm(grad)
                  factor = min(1.0, clip_norm / (norm + 1e-8))
                  clipped_grads.append(grad * factor)
                  
              # 3. Average and add noise
              avg_grad = np.mean(clipped_grads, axis=0)
              noise_scale = (sigma * clip_norm) / batch_size
              noise = np.random.normal(0, noise_scale, avg_grad.shape)
              
              noisy_grad = avg_grad + noise
              
              # 4. Weight update
              updated_weights = weights - (lr * noisy_grad)
              return updated_weights

          # ================================================================
          # 🚀 PART 2: LIVE MULTI-STEP TRAINING
          # ================================================================
          
          CLIP_NORM = 1.0
          LEARNING_RATE = 0.05
          BATCH_SIZE = 4
          EPOCHS = 3

          # Initialize dummy model weights
          model_weights = np.zeros((2, 1))

          print('================================================================')
          print('🔬 PART 2: MULTI-STEP DP-SGD TRAINING WITH PRECISE NOISE')
          print('================================================================')
          print(f'Hyperparameters: Sigma={SIGMA:.4f}, Clip={CLIP_NORM}, LR={LEARNING_RATE}\n')

          for epoch in range(EPOCHS):
              print(f'--- 🏁 EPOCH {epoch + 1} ---')
              
              X_batch = np.random.uniform(-5.0, 5.0, (BATCH_SIZE, 2))
              y_batch = np.random.uniform(-1.0, 1.0, (BATCH_SIZE, 1))
              
              model_weights = apply_dp_gradients(
                  model_weights, X_batch, y_batch, CLIP_NORM, SIGMA, LEARNING_RATE
              )
              
              print(f'  [LOG] Weights after update:\n{model_weights.flatten()}')
              print(f'  [LOG] Gradient norms safely bounded by max {CLIP_NORM}\n')

          print('================================================================')
          print('🏆 TRUE E2E PIPELINE SUCCESS')
          print('================================================================')
          print(f'Final Trained Weights:\n{model_weights}')
          "
